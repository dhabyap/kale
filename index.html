<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Buat Niskala 💙</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="content">
        <p class="label">Halo, Niskala   👋</p>
        <h1>Nonton Persib<br />bareng, yuk?</h1>
        <div class="detail">
          <p>⚽ Persib vs Bayangkara</p>
          <p>📅 30 April</p>
          <p>📍 Tempat nyusul ya</p>
        </div>
        <p class="note">Santai aja, kalo lagi sibuk gapapa 😊</p>
        <div class="buttons">
          <button id="btn-yes">Yuk, mau! 💙</button>
          <button id="btn-no">Kayaknya gak deh</button>
        </div>
      </div>
      <div id="success" class="hidden">
        <h1>Yeay! 🎉</h1>
        <p>Sip! Nanti info tempat<br />& jamnya nyusul ya 💙</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
