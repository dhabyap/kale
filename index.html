<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan Spesial untuk Niskala 💙</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <main id="app">
        <div class="card">
            <div id="content-container">
                <div class="image-container">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=persib&backgroundColor=004792" alt="Mascot" id="mascot">
                </div>
                <h1 id="greeting">Halo, Niskala! 👋</h1>
                <p id="message">Nonton Persib bareng aku yuk minggu ini? 🐯💙</p>
                <div class="button-group">
                    <button id="btn-yes">Mau banget! 💙</button>
                    <button id="btn-no">Gak dulu deh</button>
                </div>
            </div>
            <div id="success-container" class="hidden">
                <div class="image-container">
                    <img src="https://api.dicebear.com/7.x/big-smile/svg?seed=happy&backgroundColor=004792" alt="Success Mascot">
                </div>
                <h1>Yeay! 💙</h1>
                <p>Ditunggu ya harinya! Kita dukung Persib bareng-bareng! 🐯🔥</p>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
