<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buat Niskala 💙</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="content">
            <p class="label">Halo, Niskala 👋</p>
            <h1>Nonton Persib<br>bareng yuk?</h1>
            <div class="detail">
                <p>⚽ Persib vs Bayanzkara</p>
                <p>📅 Tanggal 30</p>
                <p>📍 Tempat menyusul</p>
            </div>
            <p class="note">Kalo lagi sibuk gapapa kok 😊</p>
            <div class="buttons">
                <button id="btn-yes">Mau! 💙</button>
                <button id="btn-no">Gak dulu deh</button>
            </div>
        </div>
        <div id="success" class="hidden">
            <h1>Yeay! 🎉</h1>
            <p>Nanti kabarin ya<br>buat detailnya! 💙</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
